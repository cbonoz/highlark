    <line x1="16" y1="20" x2="37" y2="20" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
    <line x1="16" y1="24" x2="37" y2="24" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
