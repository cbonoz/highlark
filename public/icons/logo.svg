<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main background circle -->
  <rect width="128" height="128" fill="url(#bgGradient)" rx="24"/>

  <!-- Screenshot frame -->
  <rect x="20" y="24" width="88" height="64" fill="none" stroke="#FFFFFF" stroke-width="3" rx="4"/>

  <!-- Screenshot content (simple grid) -->
  <line x1="28" y1="40" x2="100" y2="40" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <line x1="28" y1="52" x2="100" y2="52" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <line x1="28" y1="64" x2="100" y2="64" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>

  <!-- Annotation arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#FFD700" />
    </marker>
  </defs>
  <line x1="50" y1="45" x2="85" y2="60" stroke="#FFD700" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Annotation circle -->
  <circle cx="35" cy="55" r="6" fill="none" stroke="#FF6B6B" stroke-width="2"/>

  <!-- Sparkle effect (annotation indicator) -->
  <g id="sparkle">
    <circle cx="105" cy="32" r="3" fill="#FFD700"/>
    <circle cx="110" cy="28" r="2" fill="#FFD700" opacity="0.7"/>
    <circle cx="108" cy="36" r="1.5" fill="#FFD700" opacity="0.5"/>
  </g>
</svg>
